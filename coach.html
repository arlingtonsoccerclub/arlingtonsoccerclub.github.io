<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASC Player Evaluation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-2: #6B6B6B;
    --text-3: #9A9A95;
    --border: #E5E5E0;
    --border-strong: #C8C8C0;
    --accent: #800000;
    --accent-bg: #F6E0E0;
    --accent-text: #4A0000;
    --warn-bg: #FEF3C7;
    --warn-text: #92400E;
    --danger: #B91C1C;
    --info-bg: #E0F2FE;
    --info-text: #075985;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo {
    height: 40px; width: auto; flex-shrink: 0;
    object-fit: contain;
  }
  .brand-text-group {
    display: flex; flex-direction: column; min-width: 0; line-height: 1.2;
  }
  .brand-title {
    font-weight: 700; font-size: 16px; color: var(--text);
    letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .brand-subtitle {
    font-size: 12px; color: var(--text-2); font-weight: 500;
  }
  @media (max-width: 480px) {
    .brand-logo { height: 32px; }
    .brand-title { font-size: 14px; }
    .brand-subtitle { font-size: 11px; }
  }
  .save-status {
    font-size: 12px; color: var(--text-3);
    display: flex; align-items: center; gap: 6px;
    min-height: 18px;
  }
  .save-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-3);
  }
  .save-status.saving .save-dot { background: var(--warn-text); }
  .save-status.saved .save-dot { background: var(--accent); }
  .save-status.error .save-dot { background: var(--danger); }

  .stepper {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .step-pill {
    padding: 6px 12px; border-radius: var(--radius);
    background: #EFEFEA; color: var(--text-2);
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent;
  }
  .step-pill.active {
    background: var(--accent); color: white;
  }
  .step-pill.done {
    background: var(--accent-bg); color: var(--accent-text);
    cursor: pointer;
  }
  .step-pill.done:hover { border-color: var(--accent); }

  h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  h2 { font-size: 18px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  .subhead { color: var(--text-2); font-size: 14px; margin: 0 0 24px; }

  .field { margin-bottom: 20px; }
  .field-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .field-help { font-size: 12px; color: var(--text-2); margin: 0 0 8px; line-height: 1.5; }

  input[type="text"], input[type="email"], textarea {
    width: 100%; padding: 10px 12px;
    font-family: inherit; font-size: 16px; line-height: 1.4;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.1);
  }
  textarea { resize: vertical; min-height: 72px; }

  .check-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .check-card label {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px; cursor: pointer;
  }
  .check-card input[type="checkbox"] {
    margin-top: 3px; width: 16px; height: 16px; flex-shrink: 0;
    accent-color: var(--accent);
  }

  .pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    padding: 8px 14px; font-family: inherit; font-size: 14px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer; font-weight: 500;
    transition: all 0.12s;
    min-height: 38px;
  }
  .pill:hover { border-color: var(--border-strong); }
  .pill.selected {
    background: var(--accent); color: white; border-color: var(--accent);
  }

  .rating-list { display: flex; flex-direction: column; gap: 6px; }
  .rating-card {
    text-align: left; width: 100%;
    padding: 12px 14px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
  }
  .rating-card:hover { border-color: var(--border-strong); }
  .rating-card.selected {
    background: var(--accent-bg); border-color: var(--accent);
  }
  .rating-card.selected .rating-main { color: var(--accent-text); }
  .rating-main { font-size: 14px; font-weight: 600; }
  .rating-desc { font-size: 13px; color: var(--text-2); margin-top: 3px; line-height: 1.5; }

  .char-count { text-align: right; font-size: 11px; color: var(--text-3); margin-top: 4px; }

  .roster-grid {
    display: grid; grid-template-columns: 28px 1fr 1fr 36px;
    gap: 8px; margin-bottom: 8px; align-items: center;
  }
  .roster-grid.header {
    font-size: 12px; color: var(--text-2); margin-bottom: 6px;
  }
  .roster-num { text-align: center; font-size: 13px; color: var(--text-3); font-weight: 500; }
  .roster-grid input[type="text"] { padding: 8px 10px; font-size: 14px; }
  .icon-btn {
    width: 36px; height: 36px; padding: 0;
    background: transparent; border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    color: var(--danger); font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .icon-btn:hover:not(:disabled) { background: #FEE2E2; border-color: #FCA5A5; }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .progress-bar {
    height: 6px; background: var(--border); border-radius: 3px;
    overflow: hidden; margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s ease;
  }

  .player-header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px; margin-bottom: 8px;
  }
  .player-counter { font-size: 13px; color: var(--text-2); white-space: nowrap; font-variant-numeric: tabular-nums; }

  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .review-card.incomplete {
    background: var(--warn-bg);
    border-color: #FCD34D;
  }
  .review-card-header {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .review-name { font-weight: 600; font-size: 15px; }
  .review-num { color: var(--text-3); font-weight: 500; margin-right: 4px; }
  .review-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .review-card.incomplete .review-meta { color: var(--warn-text); }
  .review-ratings {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
    margin-bottom: 10px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.025);
    border-radius: var(--radius);
    font-size: 13px;
  }
  .review-card.incomplete .review-ratings { background: rgba(0,0,0,0.04); }
  .review-rating-row { display: flex; justify-content: space-between; gap: 8px; }
  .review-rating-key { color: var(--text-2); }
  .review-rating-val { font-weight: 500; text-align: right; }
  .review-rating-val.missing { color: var(--text-3); font-weight: 400; font-style: italic; }
  .review-section { margin-top: 8px; font-size: 13px; }
  .review-section-label { color: var(--text-2); font-size: 12px; margin-bottom: 2px; }
  .review-section-content { line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .review-section-content.missing { color: var(--text-3); font-style: italic; }
  @media (max-width: 480px) {
    .review-ratings { grid-template-columns: 1fr; gap: 4px 0; }
  }
  .team-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 20px;
  }
  .team-summary-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }

  button.btn {
    padding: 10px 16px; font-family: inherit; font-size: 14px; font-weight: 500;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.12s;
    min-height: 40px;
  }
  button.btn:hover:not(:disabled) { border-color: var(--border-strong); }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  button.btn-primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  button.btn-primary:hover:not(:disabled) { background: #660000; border-color: #660000; }
  button.btn-ghost {
    background: transparent; border-color: transparent; color: var(--text-2);
  }
  button.btn-ghost:hover:not(:disabled) { color: var(--text); background: #EFEFEA; }
  button.btn-block { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; }

  .nav-bar {
    display: flex; justify-content: space-between; gap: 10px;
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .nav-bar .right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .resume-banner {
    background: var(--info-bg); color: var(--info-text);
    border: 1px solid #BAE6FD;
    border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .resume-banner-text { font-size: 13px; }
  .resume-banner button { font-size: 13px; }

  .submit-result {
    text-align: center; padding: 32px 20px;
  }
  .submit-result-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent-bg); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    font-size: 28px;
  }
  .submit-result.error .submit-result-icon {
    background: #FEE2E2; color: var(--danger);
  }

  @media (max-width: 480px) {
    .page { padding: 16px 14px 60px; }
    .header { margin-bottom: 16px; }
    .roster-grid { grid-template-columns: 22px 1fr 1fr 32px; gap: 6px; }
    .icon-btn { width: 32px; height: 32px; }
    .nav-bar { flex-direction: column-reverse; }
    .nav-bar .btn { width: 100%; }
    .nav-bar .right { width: 100%; flex-direction: column-reverse; }
    .nav-bar .right .btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="brand">
      <img class="brand-logo" src="asc-logo.png" alt="Arlington Soccer Club" onerror="this.style.display='none'" />
      <div class="brand-text-group">
        <div class="brand-title">Arlington Soccer Club</div>
        <div class="brand-subtitle">Coach evaluation · 2026</div>
      </div>
    </div>
    <div class="save-status" id="save-status"></div>
  </div>

  <div class="stepper" id="stepper"></div>

  <div id="content"></div>

  <div class="nav-bar" id="nav"></div>

</div>

<script>
// =============================================================
// CONFIGURATION
// =============================================================
// Replace WEBHOOK_URL below with the URL you get after deploying
// the Apps Script as a Web App (Deploy > New deployment > Web app)
const CONFIG = {
  WEBHOOK_URL: 'https://script.google.com/macros/s/AKfycbwpKw2btw60M_fwJWGGM0CGvPw9iv6P0m8If7Or6PrKPo2wqUCPXrGwPF2kmNrB9_o/exec',
  DRAFT_KEY: 'asc-eval-draft-v1',
  SUBMITTED_PREFIX: 'asc-eval-submitted-',
  FORM_URL: 'https://tryouts.arlingtonsoccerclub.org/coach.html',
  AUTOSAVE_DEBOUNCE_MS: 400
};

// =============================================================
// STATE
// =============================================================
const DEFAULT_STATE = () => ({
  step: 1,
  team: { email: '', coachLastName: '', confirmed: false, gender: '', grade: '', desc: '', division: '', section: '' },
  roster: [{firstName: '', lastName: ''}, {firstName: '', lastName: ''}, {firstName: '', lastName: ''}],
  currentPlayer: 0,
  evals: {},
  submittedAt: null
});

let state = DEFAULT_STATE();
let submitting = false;
let submitResult = null; // null | 'success' | {error: '...'}

// =============================================================
// CONSTANTS
// =============================================================
const STEPS = [{n:1,l:'Team info'},{n:2,l:'Roster'},{n:3,l:'Evaluations'},{n:4,l:'Review'}];

const RATING = {
  technical: [
    {v:'much_higher',m:'Much higher',d:'Excellent, confident technique; consistently clean execution under pressure and at speed'},
    {v:'somewhat_higher',m:'Somewhat higher',d:'Strong, reliable technique; executes skills well under moderate pressure'},
    {v:'about_same',m:'About the same',d:'Competent with core skills; executes basic techniques with some consistency'},
    {v:'somewhat_lower',m:'Somewhat lower',d:'Inconsistent technique; can perform basic skills but breaks down under light pressure'},
    {v:'much_lower',m:'Much lower',d:'Struggles with basic ball control; difficulty completing simple passes or actions even without pressure'}
  ],
  understanding: [
    {v:'much_higher',m:'Much higher',d:'Excellent game intelligence; anticipates play, consistently makes smart decisions'},
    {v:'somewhat_higher',m:'Somewhat higher',d:'Good awareness and positioning; makes quick, effective decisions most of the time'},
    {v:'about_same',m:'About the same',d:'Understands general positioning; makes reasonable decisions in familiar situations'},
    {v:'somewhat_lower',m:'Somewhat lower',d:'Basic understanding but inconsistent positioning and slow decision-making'},
    {v:'much_lower',m:'Much lower',d:'Limited awareness; frequently out of position; unsure of role in game situations'}
  ],
  attitude: [
    {v:'much_higher',m:'Much higher',d:'Outstanding attitude; highly motivated, resilient, and drives own improvement'},
    {v:'somewhat_higher',m:'Somewhat higher',d:'Strong work ethic; engaged, coachable, and responds well to challenges'},
    {v:'about_same',m:'About the same',d:'Generally positive; responds to coaching and maintains effort most of the time'},
    {v:'somewhat_lower',m:'Somewhat lower',d:'Inconsistent effort and focus; limited response to coaching'},
    {v:'much_lower',m:'Much lower',d:'Low effort; disengaged; struggles to accept feedback or stay focused'}
  ],
  overall: [
    {v:'much_higher',m:'Much higher'},{v:'somewhat_higher',m:'Somewhat higher'},
    {v:'about_same',m:'About the same'},{v:'somewhat_lower',m:'Somewhat lower'},{v:'much_lower',m:'Much lower'}
  ]
};

const LABELS = {
  gender:{girls:'Girls',boys:'Boys'},
  grade:{'2':'Grade 2','3':'Grade 3','4':'Grade 4','5':'Grade 5','6':'Grade 6','78':'Grade 7/8'},
  desc:{a:'A team',b:'B team',c:'C team',ns:'Non-select'},
  overall:{much_higher:'Much higher',somewhat_higher:'Somewhat higher',about_same:'About the same',somewhat_lower:'Somewhat lower',much_lower:'Much lower'}
};

// =============================================================
// UTILITIES
// =============================================================
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function getEval(i) {
  if (!state.evals[i]) state.evals[i] = {technical:'',understanding:'',attitude:'',overall:'',comments:'',attendance:'',attendanceDesc:''};
  return state.evals[i];
}

function isEvalComplete(i) {
  const e = state.evals[i]; if (!e) return false;
  if (!e.technical || !e.understanding || !e.attitude || !e.overall || !e.attendance) return false;
  if (e.attendance === 'yes' && !e.attendanceDesc.trim()) return false;
  return true;
}

function teamValid() {
  const t = state.team;
  return t.email.trim() && t.coachLastName.trim() && t.confirmed && t.gender && t.grade && t.desc;
}

function rosterValid() {
  return state.roster.length > 0 && state.roster.every(p => p.firstName.trim() && p.lastName.trim());
}

function missingCount(idx) {
  const e = state.evals[idx];
  if (!e) return 5;
  let n = 0;
  if (!e.technical) n++;
  if (!e.understanding) n++;
  if (!e.attitude) n++;
  if (!e.overall) n++;
  if (!e.attendance) n++;
  if (e.attendance === 'yes' && !e.attendanceDesc.trim()) n++;
  return n;
}

function hasUserInput() {
  const t = state.team;
  if (t.email || t.coachLastName || t.confirmed || t.gender || t.grade || t.desc) return true;
  if (state.roster.some(p => p.firstName || p.lastName)) return true;
  if (Object.keys(state.evals).length > 0) return true;
  return false;
}

// =============================================================
// AUTOSAVE
// =============================================================
let saveTimer = null;
let lastSavedAt = null;

function setSaveStatus(kind, text) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + (kind || '');
  el.innerHTML = text ? `<span class="save-dot"></span><span>${text}</span>` : '';
}

function scheduleAutosave() {
  if (saveTimer) clearTimeout(saveTimer);
  setSaveStatus('saving', 'Saving…');
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(CONFIG.DRAFT_KEY, JSON.stringify({...state, _savedAt: Date.now()}));
      lastSavedAt = Date.now();
      setSaveStatus('saved', 'Saved');
    } catch (err) {
      setSaveStatus('error', 'Save failed');
      console.error('Autosave failed:', err);
    }
  }, CONFIG.AUTOSAVE_DEBOUNCE_MS);
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(CONFIG.DRAFT_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed;
  } catch (err) {
    console.error('Failed to load draft:', err);
    return null;
  }
}

function clearDraft() {
  try { localStorage.removeItem(CONFIG.DRAFT_KEY); } catch {}
}

// =============================================================
// SUBMISSION CACHE — persists after submit for edit/resubmit
// =============================================================
function makeSubmissionId(team, timestamp) {
  return (team.email || '') + '|' + (team.gender || '') + '|' + (team.grade || '') + '|' + timestamp;
}

function encodeId(id) {
  try { return btoa(unescape(encodeURIComponent(id))); } catch { return btoa(id); }
}

function decodeId(encoded) {
  try { return decodeURIComponent(escape(atob(encoded))); } catch { try { return atob(encoded); } catch { return null; } }
}

function submissionCacheKey(id) {
  return CONFIG.SUBMITTED_PREFIX + encodeId(id);
}

function saveSubmission(submissionId, formState) {
  try {
    var data = JSON.stringify({...formState, _submissionId: submissionId, _savedAt: Date.now()});
    localStorage.setItem(submissionCacheKey(submissionId), data);
  } catch {}
}

function loadSubmission(submissionId) {
  try {
    var raw = localStorage.getItem(submissionCacheKey(submissionId));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function findAllSubmissions() {
  var results = [];
  try {
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (!key || !key.startsWith(CONFIG.SUBMITTED_PREFIX)) continue;
      try {
        var data = JSON.parse(localStorage.getItem(key));
        if (data && data.team) results.push(data);
      } catch {}
    }
  } catch {}
  results.sort(function(a, b) { return (b._savedAt || 0) - (a._savedAt || 0); });
  return results;
}

function editUrl(submissionId) {
  return CONFIG.FORM_URL + '?edit=' + encodeURIComponent(encodeId(submissionId));
}

// Track editing mode
var editingSubmissionId = null;

// =============================================================
// SUBMIT
// =============================================================
async function submitEvaluations() {
  if (submitting) return;
  submitting = true;
  render();

  const timestamp = new Date().toISOString();
  const submissionId = makeSubmissionId(state.team, timestamp);
  const payload = {
    submittedAt: timestamp,
    formUrl: CONFIG.FORM_URL,
    team: state.team,
    roster: state.roster,
    evaluations: state.evals
  };

  if (CONFIG.WEBHOOK_URL.startsWith('PASTE_')) {
    submitting = false;
    submitResult = {error: 'Webhook URL not configured. Set CONFIG.WEBHOOK_URL in this file.'};
    render();
    return;
  }

  try {
    const res = await fetch(CONFIG.WEBHOOK_URL, {
      method: 'POST',
      mode: 'cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(payload),
      redirect: 'follow'
    });

    let body = null;
    try { body = await res.json(); } catch {}

    if (!res.ok || (body && body.ok === false)) {
      throw new Error((body && body.error) || `Server returned ${res.status}`);
    }

    submitting = false;
    submitResult = 'success';
    state.submittedAt = payload.submittedAt;
    // Use server-returned hash if available, fall back to client-generated ID
    editingSubmissionId = (body && body.editHash) || submissionId;
    saveSubmission(editingSubmissionId, state);
    clearDraft();
    render();

  } catch (err) {
    submitting = false;
    submitResult = {error: err.message || String(err)};
    render();
  }
}

// =============================================================
// RENDERING
// =============================================================
function pillRadio(name, current, options) {
  return '<div class="pill-group">' + options.map(o => {
    const sel = current === o.v;
    return `<button type="button" data-name="${name}" data-value="${o.v}" class="pill${sel?' selected':''}">${o.l}</button>`;
  }).join('') + '</div>';
}

function ratingScale(label, sublabel, name, current, options) {
  return `<div class="field">
    <label class="field-label" style="margin-bottom: 4px;">${label}</label>
    ${sublabel ? `<p class="field-help">${sublabel}</p>` : ''}
    <div class="rating-list">
      ${options.map(o => {
        const sel = current === o.v;
        return `<button type="button" data-name="f-${name}" data-value="${o.v}" class="rating-card${sel?' selected':''}">
          <div class="rating-main">${o.m}</div>
          ${o.d ? `<div class="rating-desc">${o.d}</div>` : ''}
        </button>`;
      }).join('')}
    </div>
  </div>`;
}

function renderStepper() {
  const el = document.getElementById('stepper');
  if (submitResult === 'success') { el.innerHTML = ''; return; }
  el.innerHTML = STEPS.map(s => {
    const active = s.n === state.step;
    const done = s.n < state.step;
    const cls = active ? 'active' : (done ? 'done' : '');
    return `<div class="step-pill ${cls}" data-jump-step="${done ? s.n : ''}">${s.n}. ${s.l}</div>`;
  }).join('');
  document.querySelectorAll('[data-jump-step]').forEach(el => {
    if (el.dataset.jumpStep) el.onclick = () => { state.step = parseInt(el.dataset.jumpStep); render(); };
  });
}

function renderResumeBanner() {
  // Editing a previous submission
  if (editingSubmissionId && !window._resumed) {
    return `<div class="resume-banner" style="background: #E0F2FE; color: #075985; border-color: #BAE6FD;">
      <div class="resume-banner-text">Editing a previous submission. Changes will create a new submission.</div>
      <button type="button" class="btn btn-ghost" id="discard-draft">Start fresh</button>
    </div>`;
  }
  // Resumed an in-progress draft
  if (window._resumed) {
    return `<div class="resume-banner">
      <div class="resume-banner-text">Resumed your saved draft from ${formatTime(window._resumed)}.</div>
      <button type="button" class="btn btn-ghost" id="discard-draft">Start over</button>
    </div>`;
  }
  // Check for previous submissions to offer editing
  var prev = findAllSubmissions();
  if (prev.length === 0) return '';
  var items = prev.map(function(s, idx) {
    var t = s.team || {};
    var label = [
      LABELS.gender[t.gender] || t.gender,
      LABELS.grade[t.grade] || t.grade,
      LABELS.desc[t.desc] || t.desc
    ].filter(Boolean).join(' · ');
    var when = s._savedAt ? formatTime(s._savedAt) : '';
    var count = (s.roster || []).length;
    return `<div style="display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;${idx > 0 ? ' margin-top: 8px; padding-top: 8px; border-top: 1px solid #BAE6FD;' : ''}">
      <div><strong>${label}</strong> — ${count} player${count===1?'':'s'}${when ? ' (submitted ' + when + ')' : ''}</div>
      <button type="button" class="btn btn-ghost edit-prev-btn" data-edit-id="${escapeHtml(s._submissionId || '')}">Edit</button>
    </div>`;
  }).join('');
  return `<div class="resume-banner" style="background: #E0F2FE; color: #075985; border-color: #BAE6FD;">
    <div style="margin-bottom: 6px; font-weight: 500;">Previous submission${prev.length===1?'':'s'}:</div>
    ${items}
  </div>`;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
  return sameDay ? time : `${d.toLocaleDateString([], {month: 'short', day: 'numeric'})} at ${time}`;
}

function attachRosterHandlers() {

    };

  document.querySelectorAll('[data-remove-idx]').forEach(btn => {

      const newEvals = {};

        else if (ki > i) newEvals[ki - 1] = state.evals[ki];
      });
      state.evals = newEvals;

      renderRosterList();
      renderNav();
    };
  });
}

function renderReviewCard(p, i) {
  const done = isEvalComplete(i);
  const e = state.evals[i] || {};

  function ratingRow(key, val) {
    const label = LABELS.overall[val];
    const valHtml = label
      ? `<span class="review-rating-val">${label}</span>`
      : `<span class="review-rating-val missing">—</span>`;
    return `<div class="review-rating-row"><span class="review-rating-key">${key}</span>${valHtml}</div>`;
  }

  const commentsHtml = e.comments
    ? `<div class="review-section-content">${escapeHtml(e.comments)}</div>`
    : `<div class="review-section-content missing">No comments</div>`;

  let attendanceHtml;
  if (e.attendance === 'no') {
    attendanceHtml = `<div class="review-section-content">No issues</div>`;
  } else if (e.attendance === 'yes') {
    const desc = e.attendanceDesc && e.attendanceDesc.trim()
      ? escapeHtml(e.attendanceDesc)
      : `<span class="missing">(details not yet entered)</span>`;
    attendanceHtml = `<div class="review-section-content">Yes — ${desc}</div>`;
  } else {
    attendanceHtml = `<div class="review-section-content missing">Not yet selected</div>`;
  }

  const headerMeta = done
    ? ''
    : `<div class="review-meta">${missingCount(i)} field${missingCount(i)===1?'':'s'} remaining</div>`;

  return `
    <div class="review-card${done ? '' : ' incomplete'}">
      <div class="review-card-header">
        <div style="min-width: 0; flex: 1;">
          <div class="review-name"><span class="review-num">${i+1}.</span>${escapeHtml(p.firstName)} ${escapeHtml(p.lastName)}</div>
          ${headerMeta}
        </div>
        <button type="button" class="btn" data-jump-idx="${i}">${done ? 'Edit' : 'Complete'}</button>
      </div>
      <div class="review-ratings">
        ${ratingRow('Technical', e.technical)}
        ${ratingRow('Understanding', e.understanding)}
        ${ratingRow('Attitude', e.attitude)}
        ${ratingRow('Overall', e.overall)}
      </div>
      <div class="review-section">
        <div class="review-section-label">Comments</div>
        ${commentsHtml}
      </div>
      <div class="review-section">
        <div class="review-section-label">Attendance</div>
        ${attendanceHtml}
      </div>
    </div>
  `;
}

      </p>

function renderNav() {
  const nav = document.getElementById('nav');
  if (submitResult === 'success') { nav.innerHTML = ''; return; }
  const step = state.step;
  let left = '<div></div>', right = '<div class="right"></div>';

  if (step === 1) {
    right = `<div class="right"><button type="button" class="btn btn-primary" id="nav-next" ${teamValid()?'':'disabled'}>Continue to roster →</button></div>`;
  } else if (step === 2) {
    left = `<button type="button" class="btn" id="nav-back">← Back</button>`;
    const allEvalsComplete = rosterValid() && state.roster.every((_, i) => isEvalComplete(i));
    right = `<div class="right">${allEvalsComplete
      ? '<button type="button" class="btn btn-primary" id="skip-to-review">Review →</button>'
      : `<button type="button" class="btn btn-primary" id="nav-next" ${rosterValid()?'':'disabled'}>Start evaluations →</button>`
    }</div>`;
  } else if (step === 3) {
    const idx = state.currentPlayer;
    const total = state.roster.length;
    left = `<button type="button" class="btn btn-ghost" id="nav-back">← Roster</button>`;
    let buttons = '';
    if (idx > 0) buttons += `<button type="button" class="btn" id="prev-player">← Previous</button>`;
    // Find next unevaluated player (after current)
    let nextUnevaluated = -1;
    for (let j = 0; j < total; j++) {
      if (j !== idx && !isEvalComplete(j)) { nextUnevaluated = j; break; }
    }
    if (nextUnevaluated >= 0) {
      buttons += `<button type="button" class="btn btn-primary" id="next-unevaluated">Next unevaluated →</button>`;
    } else {
      buttons += `<button type="button" class="btn btn-primary" id="finish-evals">Review →</button>`;
    }
    right = `<div class="right">${buttons}</div>`;
  } else if (step === 4) {
    left = `<button type="button" class="btn" id="nav-back">← Back to evaluations</button>`;
  }

  nav.innerHTML = left + right;

  const back = document.getElementById('nav-back');
  if (back) back.onclick = () => {
    if (step === 4) state.step = 3;
    else if (step === 3) state.step = 2;
    else state.step--;
    render();
  };
  const nxt = document.getElementById('nav-next');
  if (nxt) nxt.onclick = () => {
    if (step === 2) state.currentPlayer = 0;
    state.step++;
    render();
  };
  const skipReview = document.getElementById('skip-to-review');
  if (skipReview) skipReview.onclick = () => { state.step = 4; render(); window.scrollTo(0, 0); };
  const prev = document.getElementById('prev-player');
  if (prev) prev.onclick = () => { state.currentPlayer--; render(); window.scrollTo(0, 0); };
  const nextUn = document.getElementById('next-unevaluated');
  if (nextUn) nextUn.onclick = () => {
    // Find next unevaluated player
    var total = state.roster.length;
    for (var j = 0; j < total; j++) {
      if (j !== state.currentPlayer && !isEvalComplete(j)) {
        state.currentPlayer = j;
        render();
        window.scrollTo(0, 0);
        return;
      }
    }
    // All done — go to review
    state.step = 4; render(); window.scrollTo(0, 0);
  };
  const fin = document.getElementById('finish-evals');
  if (fin) fin.onclick = () => { state.step = 4; render(); window.scrollTo(0, 0); };
}

function handleFieldChange(name, value) {
  if (name === 'f-gender') state.team.gender = value;
  else if (name === 'f-grade') state.team.grade = value;
  else if (name === 'f-desc') state.team.desc = value;
  else if (name === 'f-division') state.team.division = value;
  else if (name === 'f-section') state.team.section = value;
  else if (state.step === 3) {
    const e = getEval(state.currentPlayer);
    if (name === 'f-technical') e.technical = value;
    else if (name === 'f-understanding') e.understanding = value;
    else if (name === 'f-attitude') e.attitude = value;
    else if (name === 'f-overall') e.overall = value;
    else if (name === 'f-attendance') e.attendance = value;
  }
  scheduleAutosave();
  render();
}

function attachStepHandlers() {
  document.querySelectorAll('.pill, .rating-card').forEach(btn => {
    btn.onclick = () => handleFieldChange(btn.dataset.name, btn.dataset.value);
  });

  const discard = document.getElementById('discard-draft');
  if (discard) discard.onclick = () => {
    if (confirm('Discard your saved draft and start over?')) {
      clearDraft();
      state = DEFAULT_STATE();
      window._resumed = null;
      render();
    }
  };

  if (state.step === 1) {
    const email = document.getElementById('f-email');
    if (email) email.oninput = e => { state.team.email = e.target.value; scheduleAutosave(); renderNav(); };
    const cln = document.getElementById('f-coachLastName');
    if (cln) cln.oninput = e => { state.team.coachLastName = e.target.value; scheduleAutosave(); renderNav(); };
    const conf = document.getElementById('f-confirmed');
    if (conf) conf.onchange = e => { state.team.confirmed = e.target.checked; scheduleAutosave(); renderNav(); };
  }

  if (state.step === 2) {
    renderRosterList();
    document.getElementById('add-player').onclick = () => {
      state.roster.push({firstName: '', lastName: ''});
      scheduleAutosave();
      renderRosterList();
      renderNav();
    };
  }

  if (state.step === 3) {
    const ce = getEval(state.currentPlayer);
    const ct = document.getElementById('f-comments');
    if (ct) ct.oninput = e => {
      ce.comments = e.target.value;
      const cc = document.getElementById('comments-count');
      if (cc) cc.textContent = e.target.value.length;
      scheduleAutosave();
    };
    const ad = document.getElementById('f-attendanceDesc');
    if (ad) ad.oninput = e => {
      ce.attendanceDesc = e.target.value;
      const ac = document.getElementById('attendance-count');
      if (ac) ac.textContent = e.target.value.length;
      scheduleAutosave();
    };
  }

  if (state.step === 4) {
    document.querySelectorAll('[data-jump-idx]').forEach(btn => {
      btn.onclick = () => {
        state.currentPlayer = parseInt(btn.dataset.jumpIdx);
        state.step = 3;
        submitResult = null;
        render();
        window.scrollTo(0, 0);
      };
    });
    const submit = document.getElementById('submit-all');
    if (submit) submit.onclick = submitEvaluations;

    // Add player from review page
    const reviewAddBtn = document.getElementById('review-add-player');
    if (reviewAddBtn) {
      function doAddFromReview() {
        var fn = document.getElementById('add-first-name');
        var ln = document.getElementById('add-last-name');
        var msg = document.getElementById('add-player-msg');
        var firstName = (fn ? fn.value.trim() : '');
        var lastName = (ln ? ln.value.trim() : '');
        if (!firstName || !lastName) {
          if (msg) { msg.textContent = 'Both names are required.'; msg.style.color = '#B91C1C'; }
          return;
        }
        state.roster.push({ firstName: firstName, lastName: lastName });
        scheduleAutosave();
        if (fn) fn.value = '';
        if (ln) ln.value = '';
        if (msg) { msg.textContent = firstName + ' ' + lastName + ' added. Click their name to evaluate.'; msg.style.color = '#059669'; }
        // Re-render to show the new player card
        render();
      }
      reviewAddBtn.onclick = doAddFromReview;
      // Enter key in inputs
      var addFn = document.getElementById('add-first-name');
      var addLn = document.getElementById('add-last-name');
      if (addFn) addFn.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); doAddFromReview(); } };
      if (addLn) addLn.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); doAddFromReview(); } };
    }
  }

  const startNew = document.getElementById('start-new');
  if (startNew) startNew.onclick = () => {
    state = DEFAULT_STATE();
    submitResult = null;
    editingSubmissionId = null;
    window._resumed = null;
    render();
    window.scrollTo(0, 0);
  };

  // Edit just-submitted evaluation
  const editSubmitted = document.getElementById('edit-submitted');
  if (editSubmitted) editSubmitted.onclick = () => {
    if (editingSubmissionId) {
      var saved = loadSubmission(editingSubmissionId);
      if (saved) {
        if (saved.evaluations && !saved.evals) saved.evals = saved.evaluations;
        var re = {}; Object.keys(saved.evals || {}).forEach(function(k) { re[parseInt(k)] = saved.evals[k]; }); saved.evals = re;
        state = {...DEFAULT_STATE(), ...saved, step: 4, submittedAt: null};
        submitResult = null;
        render();
        window.scrollTo(0, 0);
        return;
      }
    }
    // Fallback: just reset to step 1 with current state
    state.step = 1;
    state.submittedAt = null;
    submitResult = null;
    render();
    window.scrollTo(0, 0);
  };

  // Edit previous submissions (from banner)
  document.querySelectorAll('.edit-prev-btn').forEach(function(btn) {
    btn.onclick = function() {
      var id = btn.dataset.editId;
      var saved = loadSubmission(id);
      if (!saved) return;
      if (saved.evaluations && !saved.evals) saved.evals = saved.evaluations;
      var re = {}; Object.keys(saved.evals || {}).forEach(function(k) { re[parseInt(k)] = saved.evals[k]; }); saved.evals = re;
      editingSubmissionId = id;
      state = {...DEFAULT_STATE(), ...saved, step: 4, submittedAt: null};
      submitResult = null;
      window._resumed = null;
      render();
      window.scrollTo(0, 0);
    };
  });
}

function render() {
  renderStepper();
  const c = document.getElementById('content');
  if (submitResult === 'success') {
    c.innerHTML = renderSubmitSuccess();
  } else if (state.step === 1) {
    c.innerHTML = renderTeamInfo();
  } else if (state.step === 2) {
    c.innerHTML = renderRoster();
  } else if (state.step === 3) {
    c.innerHTML = renderPlayerEval();
  } else if (state.step === 4) {
    c.innerHTML = renderReview();
  }
  renderNav();
  attachStepHandlers();
}

// =============================================================
// INIT
// =============================================================
function init() {
  // Check for ?edit= URL parameter (from confirmation email link)
  var params = new URLSearchParams(window.location.search);
  var editHash = params.get('edit');
  if (editHash) {
    // Show loading state
    document.getElementById('content').innerHTML =
      '<div style="text-align: center; padding: 60px 20px;">' +
        '<div class="spinner" style="width: 22px; height: 22px; margin: 0 auto 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;"></div>' +
        '<p style="color: var(--text-2);">Loading your previous submission…</p>' +
      '</div>';

    // Fetch from server
    fetch(CONFIG.WEBHOOK_URL + '?action=getSubmission&hash=' + encodeURIComponent(editHash), {
      method: 'GET', redirect: 'follow'
    })
    .then(function(res) { return res.json(); })
    .then(function(body) {
      if (body && body.ok && body.submission) {
        var saved = body.submission;
        // Payload uses "evaluations" but state uses "evals" — remap
        if (saved.evaluations && !saved.evals) {
          saved.evals = saved.evaluations;
        }
        editingSubmissionId = editHash;
        // Ensure evals are keyed numerically for getEval(i) compatibility
        var remappedEvals = {};
        var evalsObj = saved.evals || {};
        Object.keys(evalsObj).forEach(function(k) { remappedEvals[parseInt(k)] = evalsObj[k]; });
        saved.evals = remappedEvals;
        // Start on review page (step 4) so coach sees their submission first
        state = {...DEFAULT_STATE(), ...saved, step: 4, submittedAt: null};
        // Also cache locally
        if (saved.team) saveSubmission(editHash, saved);
        render();
      } else if (body && body.expired) {
        // Link expired — newer submission exists
        document.getElementById('content').innerHTML =
          '<div style="text-align: center; padding: 60px 20px; max-width: 440px; margin: 0 auto;">' +
            '<div style="font-size: 28px; margin-bottom: 12px;">&#9888;</div>' +
            '<h2 style="margin: 0 0 8px; font-size: 18px;">This link has expired</h2>' +
            '<p style="color: var(--text-2); margin: 0 0 16px; font-size: 14px; line-height: 1.5;">A newer submission has been made, so this edit link is no longer active. Please check your email for the latest edit link.</p>' +
            '<p style="color: var(--text-2); margin: 0 0 20px; font-size: 13px;">If you need help, contact <a href="mailto:mclarkelauer@arlingtonsoccerclub.org" style="color: var(--accent);">mclarkelauer@arlingtonsoccerclub.org</a></p>' +
            '<button type="button" class="btn btn-primary" onclick="window.location.href=\'' + CONFIG.FORM_URL + '\'">Start a new submission</button>' +
          '</div>';
      } else {
        // Not found
        document.getElementById('content').innerHTML =
          '<div style="text-align: center; padding: 60px 20px; max-width: 440px; margin: 0 auto;">' +
            '<h2 style="margin: 0 0 8px; font-size: 18px;">Submission not found</h2>' +
            '<p style="color: var(--text-2); margin: 0 0 16px; font-size: 14px; line-height: 1.5;">This link may be invalid. Please check your email for the correct edit link.</p>' +
            '<p style="color: var(--text-2); margin: 0 0 20px; font-size: 13px;">If you need help, contact <a href="mailto:mclarkelauer@arlingtonsoccerclub.org" style="color: var(--accent);">mclarkelauer@arlingtonsoccerclub.org</a></p>' +
            '<button type="button" class="btn btn-primary" onclick="window.location.href=\'' + CONFIG.FORM_URL + '\'">Start a new submission</button>' +
          '</div>';
      }
    })
    .catch(function() {
      document.getElementById('content').innerHTML =
        '<div style="text-align: center; padding: 60px 20px;">' +
          '<p style="color: var(--text-2); margin-bottom: 16px;">Could not load the submission. Check your connection and try again.</p>' +
          '<button type="button" class="btn" onclick="location.reload()">Retry</button>' +
        '</div>';
    });
    return;
  }

  // Check for in-progress draft
  var draft = loadDraft();
  if (draft && draft.team) {
    state = {...DEFAULT_STATE(), ...draft};
    if (draft._savedAt) {
      window._resumed = draft._savedAt;
      lastSavedAt = draft._savedAt;
      setSaveStatus('saved', 'Saved');
    }
  }
  render();
}

init();
</script>

</body>
</html>
